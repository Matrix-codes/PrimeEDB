<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>PrimeADB — Android Device Manager</title>
  <meta name="description" content="Professional Android device management tool with ADB and Fastboot support." />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/animations.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/sidebar.css" />
</head>
<body>
  <div id="app">

    <!-- ── Custom Title Bar ──────────────────────────────────────── -->
    <div id="titlebar">
      <div class="titlebar-logo">
        <svg class="titlebar-logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="6" fill="url(#grad1)"/>
          <text x="6" y="20" font-size="14" fill="white">🤖</text>
          <defs>
            <linearGradient id="grad1" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#4f8ef7"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="titlebar-app-name">PrimeADB</span>
      </div>

      <!-- Device Status -->
      <div class="titlebar-device-status">
        <span class="status-dot" id="tb-status-dot" style="background:var(--text-muted);"></span>
        <span style="font-size:0.8rem; color:var(--text-muted);" id="tb-device-count">Checking devices...</span>
      </div>

      <!-- Window Controls -->
      <div class="titlebar-controls">
        <button class="titlebar-btn minimize" id="tb-minimize" title="Minimize">─</button>
        <button class="titlebar-btn maximize" id="tb-maximize" title="Maximize">□</button>
        <button class="titlebar-btn close" id="tb-close" title="Close">✕</button>
      </div>
    </div>

    <!-- ── Sidebar ────────────────────────────────────────────────── -->
    <div id="sidebar"></div>

    <!-- ── Main Content ───────────────────────────────────────────── -->
    <!-- Pages are appended here by the router; each page gets its own root div -->
    <main id="main-content"></main>

  </div>

  <!-- ── Components ────────────────────────────────────────────────── -->
  <script src="../components/toast.js"></script>
  <script src="../components/modal.js"></script>
  <script src="../components/loading.js"></script>
  <script src="../components/sidebar.js"></script>

  <!-- ── Utilities ─────────────────────────────────────────────────── -->
  <script src="../utils/store.js"></script>

  <!-- ── Pages ─────────────────────────────────────────────────────── -->
  <script src="../pages/dashboard.js"></script>
  <script src="../pages/adb-tools.js"></script>
  <script src="../pages/fastboot.js"></script>
  <script src="../pages/file-manager.js"></script>
  <script src="../pages/logcat.js"></script>
  <script src="../pages/terminal.js"></script>
  <script src="../pages/wireless.js"></script>
  <script src="../pages/settings.js"></script>

  <!-- ── App Router (must be last) ─────────────────────────────────── -->
  <script src="renderer.js"></script>

  <!-- ── Window Controls (inline for title bar) ────────────────────── -->
  <script>
    // Custom window controls - communicate via primeADB API if available
    // These are graceful fallbacks; actual minimize/maximize/close
    // use native electron via ipcRenderer which is not directly available here.
    document.getElementById('tb-close')?.addEventListener('click', () => window.close());
  </script>
</body>
</html>
